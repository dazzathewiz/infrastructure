---
- hosts: controlhost
  roles:
    - controlhost

- hosts: all,!control,!unraid,!pikvms
  roles:
    - sshkeys

# pikvm has a read-only filesystem; gather_facts disabled so pre_tasks runs rw before any module writes
- hosts: pikvms
  gather_facts: false
  pre_tasks:
    - name: Remount filesystem read-write
      raw: rw
      changed_when: false
  roles:
    - sshkeys
  post_tasks:
    - name: Remount filesystem read-only
      raw: ro
      changed_when: false

# Unraid doesn't ship with Python, ergo no gather_facts, and use `raw` interpreter instead
- hosts: unraid
  gather_facts: false
  tasks:
    - name: Ensure /root/.ssh exists
      raw: mkdir -p /root/.ssh && chmod 700 /root/.ssh
      changed_when: false

    - name: Distribute control host pubkeys to authorized_keys
      raw: |
        key="{{ lookup('file', item) | trim }}"
        keydata=$(echo "$key" | awk '{print $2}')
        if grep -q "$keydata" /root/.ssh/authorized_keys 2>/dev/null; then
          echo "EXISTS"
        else
          echo "$key" >> /root/.ssh/authorized_keys
          echo "ADDED"
        fi
      with_fileglob:
        - "roles/controlhost/files/*.pub"
      register: key_result
      changed_when: "'ADDED' in key_result.stdout"
